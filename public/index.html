<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明日できることは明日やる</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
    background: #f5f1e8;
}

.container {
    max-width: 600px;
    margin: auto;
}

h1 {
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

#status {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border-radius: 8px;
}

.task-card {

    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;

    display: flex;
    justify-content: space-between;
    align-items: center;
    
    gap: 10px;
}

.task-buttons {
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
}

.task-buttons button {
    font-size: 18px;
    padding: 2px 4px;
    margin-left: 2px;
    border: none;
    background: none;
    cursor: pointer;
}

.task-buttons button:hover {

    opacity: 0.6;
}

.task-card:hover .task-buttons {

    opacity: 1;
}

display:flex;

</style>

</head>

<body>

<div class="container">

```
<h1>📖 明日できることは明日やる</h1>

<p>
    Firestore接続テスト
</p>

<div id="status">
    ボタンを押してください
</div>

<input
    id="taskTitle"
    type="text"
    placeholder="タスクを入力"
>
<br><br>

<select id="importance">
    <option value="3">
        🔴 高
    </option>
    <option value="2" selected>
        🟡 中
    </option>
    <option value="1">
        ⚪ 低
    </option>
</select>

<br><br>

<select id="motivation">

    <option value="5">
        🚀 やるぞ
    </option>

    <option value="4">
        🙂 普通
    </option>

    <option value="3" selected>
        😐 微妙
    </option>

    <option value="2">
        🥱 やりたくない
    </option>

    <option value="1">
        💀 無理
    </option>

</select>

<br><br>

<button onclick="addTask()">
    追加
</button>

<hr>

<h2>今日</h2>

<div id="taskList">
</div>

<div id="status">
    タスクを入力してください
</div>

<!--
	<button onclick="testAddTask()">
	    Firestore接続テスト
	</button>

	<button onclick="loadTasks()">
	    Firestoreから読み込み
	</button>
-->

<h2>今日</h2>
<div id="todayList"></div>

<hr>

<h2>明日</h2>
<div id="tomorrowList"></div>

<hr>

<h2>そのうち</h2>
<div id="somedayList"></div>
```

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
	query,
	orderBy,
	doc,
    updateDoc,
    deleteDoc,
    increment,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADTLt3GU2IrdqlzhLxRnZxf_XAbnJp6x4",
  authDomain: "ashita-yaru.firebaseapp.com",
  projectId: "ashita-yaru",
  storageBucket: "ashita-yaru.firebasestorage.app",
  messagingSenderId: "965649048873",
  appId: "1:965649048873:web:bec7089b9f2044b62a0338"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addTask = async function () {

    const title = document.getElementById("taskTitle").value.trim();
    const importance =
    Number(
        document.getElementById("importance").value
    	);
	const motivation =
    	Number(
        	document.getElementById("motivation").value
    	);
    if (!title) {
        alert("タイトルを入力してください");
        return;
    }

    try {
        await addDoc(
            collection(db, "tasks"),
            {
                title: title,
                detail: "",
                dueDate: null,
                importance: importance,
                motivation: motivation,
                bucket: "today",
                completed: false,
                tomorrowCount: 0,
                somedayCount: 0,
                sortOrder: Date.now(),
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                completedAt: null,
                lastMovedAt: serverTimestamp()
            }
        );

        document.getElementById("taskTitle").value = "";
        document.getElementById("status").innerHTML = "✅ 追加しました";

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML = "❌ エラー<br>" + error.message;
    }
};

window.loadTasks = async function () {

    const todayList = document.getElementById("todayList");
    const tomorrowList = document.getElementById("tomorrowList");
    const somedayList = document.getElementById("somedayList");

    todayList.innerHTML = "読み込み中...";
    tomorrowList.innerHTML = "読み込み中...";
    somedayList.innerHTML = "読み込み中...";

    let todayTodo = "";
    let todayDone = "";
    let tomorrowTodo = "";
    let tomorrowDone = "";
    let somedayTodo = "";
    let somedayDone = "";

    try {
        const q = query(
            collection(db, "tasks"),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        snapshot.forEach((docSnap) => {

            const task = docSnap.data();
            const completedMark = task.completed ? "☑" : "☐";

			let importanceEmoji = "🟡";

			if (task.importance === 3) {
			    importanceEmoji = "🔴";
			}

			else if (task.importance === 2) {
			    importanceEmoji = "🟡";
			}
			else {
			    importanceEmoji = "⚪";
			}

			let motivationEmoji = "😐";

			if (task.motivation === 5) {
			    motivationEmoji = "🚀";
			}

			else if (task.motivation === 4) {
			    motivationEmoji = "🙂";
			}

			else if (task.motivation === 3) {
			    motivationEmoji = "😐";
			}

			else if (task.motivation === 2) {
			    motivationEmoji = "🥱";
			}

			else {
			    motivationEmoji = "💀";
			}

            let moveButtons = "";

            if (task.bucket === "today") {
		    moveButtons = `
		        <button onclick="editTask('${docSnap.id}', '${task.title}')">✏️</button>

		        <button onclick="moveToTomorrow('${docSnap.id}')">🌙</button>

		        <button onclick="moveToSomeday('${docSnap.id}')">📦</button>

		        <button onclick="deleteTask('${docSnap.id}')">🗑️</button>
		    `;
			} else if (task.bucket === "tomorrow" || task.bucket === "someday") {
			    moveButtons = `
			        <button onclick="editTask('${docSnap.id}', '${task.title}')">✏️</button>

			        <button onclick="moveToToday('${docSnap.id}')">↩️</button>

			        <button onclick="deleteTask('${docSnap.id}')">🗑️</button>
			    `;
			}

			const tomorrowBadge =
			    task.tomorrowCount && task.tomorrowCount > 0
			    ? ` 🌙×${task.tomorrowCount}`
			    : "";

			const html = `
			    <div class="task-card">

			        <span
			            style="cursor:pointer;
			            flex:1;
			            "
			            onclick="toggleComplete('${docSnap.id}', ${task.completed})"
			        >
			            ${completedMark} ${importanceEmoji}${motivationEmoji} ${task.title}${tomorrowBadge}
			        </span>

			        <div class="task-buttons">
			            ${moveButtons}
			        </div>

			    </div>
			`;
			
            if (task.bucket === "today") {
                if (task.completed) {
                    todayDone += html;
                } else {
                    todayTodo += html;
                }
            } else if (task.bucket === "tomorrow") {
                if (task.completed) {
                    tomorrowDone += html;
                } else {
                    tomorrowTodo += html;
                }
            } else if (task.bucket === "someday") {
                if (task.completed) {
                    somedayDone += html;
                } else {
                    somedayTodo += html;
                }
            }
        });

        todayList.innerHTML = `
            <h4>未完了</h4>
            ${todayTodo || "<p>なし</p>"}
            <hr>
            <h4>完了済み</h4>
            ${todayDone || "<p>なし</p>"}
        `;

        tomorrowList.innerHTML = `
            <h4>未完了</h4>
            ${tomorrowTodo || "<p>なし</p>"}
            <hr>
            <h4>完了済み</h4>
            ${tomorrowDone || "<p>なし</p>"}
        `;

        somedayList.innerHTML = `
            <h4>未完了</h4>
            ${somedayTodo || "<p>なし</p>"}
            <hr>
            <h4>完了済み</h4>
            ${somedayDone || "<p>なし</p>"}
        `;

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =
            "❌ 読み込みエラー<br>" + error.message;
    }
};

window.toggleComplete = async function (taskId, completed) {

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                completed: !completed,
                completedAt: !completed ? serverTimestamp() : null,
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.moveToTomorrow = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "tomorrow",
                tomorrowCount: increment(1),
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.moveToSomeday = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "someday",

                somedayCount: 1,

                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.moveToToday = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "today",
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.deleteTask = async function (taskId) {

    const ok = confirm("このタスクを削除しますか？");

    if (!ok) {
        return;
    }

    try {
        await deleteDoc(
            doc(db, "tasks", taskId)
        );

        document.getElementById("status").innerHTML =
            "🗑️ 削除しました";

        loadTasks();

    } catch (error) {
        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 削除エラー<br>" + error.message;
    }
};

window.editTask = async function (taskId, currentTitle) {

    const newTitle = prompt("タスク名を編集", currentTitle);

    if (newTitle === null) {
        return;
    }

    const title = newTitle.trim();

    if (!title) {
        alert("タイトルは空にできません");
        return;
    }

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                title: title,
                updatedAt: serverTimestamp()
            }
        );

        document.getElementById("status").innerHTML =
            "✏️ 更新しました";

        loadTasks();

    } catch (error) {
        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.addEventListener("load", function () {
    loadTasks();
});

</script>

</body>
</html>
