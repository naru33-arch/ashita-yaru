<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明日できることは明日やる</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
    background: #f5f1e8;
}

.container {
    max-width: 600px;
    margin: auto;
}

h1 {
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

#status {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

```
<h1>📖 明日できることは明日やる</h1>

<p>
    Firestore接続テスト
</p>

<div id="status">
    ボタンを押してください
</div>

<button onclick="testAddTask()">
    Firestore接続テスト
</button>

<button onclick="loadTasks()">
    Firestoreから読み込み
</button>

<div id="taskList">
</div>
```

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
	query,
	orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADTLt3GU2IrdqlzhLxRnZxf_XAbnJp6x4",
  authDomain: "ashita-yaru.firebaseapp.com",
  projectId: "ashita-yaru",
  storageBucket: "ashita-yaru.firebasestorage.app",
  messagingSenderId: "965649048873",
  appId: "1:965649048873:web:bec7089b9f2044b62a0338"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.testAddTask = async function () {

    const status = document.getElementById("status");

    try {

        const docRef = await addDoc(
            collection(db, "tasks"),
            {
                title: "Firestore接続テスト",
                detail: "",
                dueDate: null,

                importance: 2,
                motivation: 2,

                bucket: "today",

                completed: false,

                tomorrowCount: 0,
                somedayCount: 0,

                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),

                completedAt: null,
                lastMovedAt: serverTimestamp()
            }
        );

        status.innerHTML =
            "✅ 保存成功<br>ID: " + docRef.id;

    } catch (error) {

        console.error(error);

        status.innerHTML =
            "❌ エラー<br>" + error.message;
    }
};

window.loadTasks = async function () {

    const taskList = document.getElementById("taskList");
    taskList.innerHTML = "読み込み中...";

    try {

        const q = query(
            collection(db, "tasks"),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        if (snapshot.empty) {
            taskList.innerHTML = "タスクはありません";
            return;
        }

        let html = "<h2>タスク一覧</h2>";

        snapshot.forEach((doc) => {
            const task = doc.data();

            const completedMark = task.completed ? "☑" : "☐";

            html += `
                <div style="background:white; padding:10px; margin:10px 0; border-radius:8px;">
                    ${completedMark} ${task.title}<br>
                    <small>ID: ${doc.id}</small>
                </div>
            `;
        });

        taskList.innerHTML = html;

    } catch (error) {

        console.error(error);
        taskList.innerHTML = "❌ 読み込みエラー<br>" + error.message;
    }
};
</script>

</body>
</html>
