function getDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

function getTomorrowKey() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return getDateKey(d);
}

async function dayRollover() {
    const todayKey = getDateKey(new Date());

    console.log("rollover start", todayKey);

    const q = query(
        collection(db, "tasks"),
        orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);

    const updates = [];

    snapshot.forEach((docSnap) => {
        const task = docSnap.data();

        // taskDate がない古いタスクは対象外
        if (!task.taskDate) {
            return;
        }

        // tomorrow → today
        if (
            task.bucket === "tomorrow" &&
            task.taskDate <= todayKey
        ) {
            updates.push(
                updateDoc(doc(db, "tasks", docSnap.id), {
                    bucket: "today",
                    taskDate: todayKey,
                    updatedAt: serverTimestamp(),
                    lastMovedAt: serverTimestamp()
                })
            );
        }

        // 前日以前に完了した today タスクを非表示
        if (
            task.bucket === "today" &&
            task.completed === true &&
            task.taskDate < todayKey
        ) {
            updates.push(
                updateDoc(doc(db, "tasks", docSnap.id), {
                    hidden: true,
                    updatedAt: serverTimestamp()
                })
            );
        }
    });

    await Promise.all(updates);

    console.log(`rollover done: ${updates.length}件更新`);
}

window.addTask = async function () {

	if (!currentUser) {
    	alert("ログインしてください");
    	return;
  	}

    const title = document.getElementById("taskTitle").value.trim();
    const importance = Number(document.getElementById("importance").value);
    const motivation = Number(document.getElementById("motivation").value);

    if (!title) {
        alert("タイトルを入力してください");
        return;
    }

    try {
        if (editingTaskId) {
            await updateDoc(
                doc(db, "tasks", editingTaskId),
                {
                    title: title,
                    importance: importance,
                    motivation: motivation,
                    updatedAt: serverTimestamp()
                }
            );

            document.getElementById("status").innerHTML = "✏️ 更新しました";

        } else {
            await addDoc(
                collection(db, "tasks"),
                {
                    uid: currentUser.uid,
                    title: title,
                    detail: "",
                    dueDate: null,
                    importance: importance,
                    motivation: motivation,
                    bucket: "today",
                    taskDate: getDateKey(new Date()),
                    completed: false,
                    tomorrowCount: 0,
                    somedayCount: 0,
                    sortOrder: Date.now(),
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    completedAt: null,
                    lastMovedAt: serverTimestamp()
                }
            );

            document.getElementById("status").innerHTML = "✅ 追加しました";
        }

        editingTaskId = null;
        document.getElementById("taskTitle").value = "";
        document.getElementById("importance").value = "2";
        document.getElementById("motivation").value = "3";

		document.getElementById("taskFormTitle").textContent = "➕ タスク追加";

        closeTaskForm();
        closeAllSwipe();
        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =

    }
};

window.loadTasks = async function () {

    console.log("読込時 currentUser:", currentUser);
    console.log("読込時 uid:", currentUser?.uid);

    const todayList = document.getElementById("todayList");
    const tomorrowList = document.getElementById("tomorrowList");
    const somedayList = document.getElementById("somedayList");
    const status = document.getElementById("status");

    if (!todayList || !tomorrowList || !somedayList) {
        console.error("タスクリスト要素が見つかりません");
        return;
    }

    todayList.innerHTML = "読み込み中...";
    tomorrowList.innerHTML = "読み込み中...";
    somedayList.innerHTML = "読み込み中...";

    if (status) {
        status.innerHTML = "";
    }

    if (!currentUser) {
        todayList.innerHTML = emptyTask();
        tomorrowList.innerHTML = emptyTask();
        somedayList.innerHTML = emptyTask();
        return;
    }

    let todayTodo = "";
    let todayDone = "";
    let tomorrowTodo = "";
    let tomorrowDone = "";
    let somedayTodo = "";
    let somedayDone = "";

    try {
        const q = query(
            collection(db, "tasks"),
            where("uid", "==", currentUser.uid),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        console.log("取得件数:", snapshot.size);

        snapshot.forEach((docSnap) => {

            const task = docSnap.data();

            if (task.hidden === true) {
                return;
            }

            const completedMark = task.completed ? "☑" : "☐";

            let titleStyle = "";
            if (task.completed) {
                titleStyle =
                    "text-decoration: line-through; opacity: 0.25; filter: grayscale(100%);";
            }

            let importanceEmoji = "🟡";

            if (task.importance === 3) {
                importanceEmoji = "🔴";
            } else if (task.importance === 2) {
                importanceEmoji = "🟡";
            } else {
                importanceEmoji = "⚪️";
            }

            let motivationEmoji = "😐";

            if (task.motivation === 5) {
                motivationEmoji = "🚀";
            } else if (task.motivation === 4) {
                motivationEmoji = "🙂";
            } else if (task.motivation === 3) {
                motivationEmoji = "😐";
            } else if (task.motivation === 2) {
                motivationEmoji = "🥱";
            } else {
                motivationEmoji = "💀";
            }

            let moveButtons = "";

            if (task.bucket === "today") {
                moveButtons = `
                    <button onclick="event.stopPropagation(); editTask('${docSnap.id}', '${task.title}', ${task.importance || 2}, ${task.motivation || 3})">✏️</button>
                    <button onclick="event.stopPropagation(); moveToTomorrow('${docSnap.id}')">🌙</button>
                    <button onclick="event.stopPropagation(); moveToSomeday('${docSnap.id}')">📦</button>
                    <button onclick="event.stopPropagation(); deleteTask('${docSnap.id}')">🗑️</button>
                `;
            } else if (task.bucket === "tomorrow" || task.bucket === "someday") {
                moveButtons = `
                    <button onclick="event.stopPropagation(); editTask('${docSnap.id}', '${task.title}', ${task.importance || 2}, ${task.motivation || 3})">✏️</button>
                    <button onclick="event.stopPropagation(); moveToToday('${docSnap.id}')">↩️</button>
                    <button onclick="event.stopPropagation(); deleteTask('${docSnap.id}')">🗑️</button>
                `;
            }

            const tomorrowBadge =
                task.tomorrowCount && task.tomorrowCount > 0
                    ? ` 🌙×${task.tomorrowCount}`
                    : "";

            const html = `
                <div class="swipe-wrapper">
                    <div
                        class="task-card"
                        data-id="${docSnap.id}"
                        data-completed="${task.completed}"
                    >
                        <span
                            class="task-text"
                            style="
                                cursor:default;
                                flex:1;
                                user-select:none;
                                ${titleStyle}
                            "
                            onclick="handleTaskClick('${docSnap.id}', ${task.completed})"
                        >
                            <span class="task-label">
                                <span
                                    class="completed-mark"
                                    onclick="event.stopPropagation(); toggleComplete('${docSnap.id}', ${task.completed})"
                                >
                                    ${completedMark}
                                </span>
                                ${importanceEmoji}${motivationEmoji} ${task.title}${tomorrowBadge}
                            </span>
                        </span>

                        <span class="drag-handle">☰</span>
                    </div>

                    <div class="swipe-actions">
                        ${moveButtons}
                    </div>
                </div>
            `;

            if (task.bucket === "today") {
                if (task.completed) {
                    todayDone += html;
                } else {
                    todayTodo += html;
                }
            } else if (task.bucket === "tomorrow") {
                if (task.completed) {
                    tomorrowDone += html;
                } else {
                    tomorrowTodo += html;
                }
            } else if (task.bucket === "someday") {
                if (task.completed) {
                    somedayDone += html;
                } else {
                    somedayTodo += html;
                }
            }
        });

        todayList.innerHTML = `
            <div class="sortable-list" data-bucket="today">
                ${todayTodo || emptyTask()}
            </div>

            ${todayDone || ""}
        `;

        tomorrowList.innerHTML = `
            <div class="sortable-list" data-bucket="tomorrow">
                ${tomorrowTodo || emptyTask()}
            </div>

            ${tomorrowDone || ""}
        `;

        somedayList.innerHTML = `
            <div class="sortable-list" data-bucket="someday">
                ${somedayTodo || emptyTask()}
            </div>

            ${somedayDone || ""}
        `;

        initSortable();
        initSwipe();

    } catch (error) {
        console.error("UI初期化エラー:", error);

        todayList.innerHTML = "読み込みに失敗しました。リロードしてください。";
        tomorrowList.innerHTML = "";
        somedayList.innerHTML = "";

        if (status) {
            status.innerHTML =
                "❌ 読み込みエラー<br>" + error.message;
        }
    }
};

window.toggleComplete = async function (taskId, completed) {

	if (!currentUser) {
	  alert("ログインしてください");
	  return;
	}

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                completed: !completed,
                completedAt: !completed ? serverTimestamp() : null,
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.handleTaskClick = function (taskId, completed) {

    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
        return;
    }

    toggleComplete(taskId, completed);
};

window.moveToTomorrow = async function (taskId) {

	if (!currentUser) {
	  alert("ログインしてください");
	  return;
	}

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "tomorrow",
                taskDate: getTomorrowKey(),
                tomorrowCount: increment(1),
                updatedAt: serverTimestamp(),
                lastMovedAt: serverTimestamp()

window.editTask = async function (taskId, currentTitle, importance, motivation) {
    editingTaskId = taskId;

    document.getElementById("taskTitle").value = currentTitle;
    document.getElementById("importance").value = importance || 2;
    document.getElementById("motivation").value = motivation || 3;

	document.getElementById("taskFormTitle").textContent = "✏️ タスク編集";
	document.getElementById("saveTaskButton").textContent = "保存";

    closeAllSwipe();
    openTaskForm();
};

window.initSortable = function () {

    document.querySelectorAll(".sortable-list").forEach((list) => {

        new Sortable(list, {
            animation: 150,
            handle: ".drag-handle",
            ghostClass: "dragging",

            onEnd: async function () {

                const cards = list.querySelectorAll(".task-card");

                try {
                    const updates = [];

                    cards.forEach((card, index) => {
                        const taskId = card.dataset.id;

                        updates.push(
                            updateDoc(
                                doc(db, "tasks", taskId),
                                {
                                    sortOrder: (index + 1) * 1000,
                                    updatedAt: serverTimestamp()
                                }
                            )
                        );
                    });

                    await Promise.all(updates);

                    document.getElementById("status").innerHTML =
                        "↕️ 並び順を保存しました";

                } catch (error) {
                    console.error("UI初期化エラー:", error);
                    document.getElementById("status").innerHTML =
                        "❌ 並び替え保存エラー<br>" + error.message;
                }
            }
        });
    });
};

};
