<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明日できることは明日やる</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
    background: #f5f1e8;
}

.container {
    max-width: 600px;
    margin: auto;
}

h1 {
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

#status {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

```
<h1>📖 明日できることは明日やる</h1>

<p>
    Firestore接続テスト
</p>

<div id="status">
    ボタンを押してください
</div>

<input
    id="taskTitle"
    type="text"
    placeholder="タスクを入力"
>

<button onclick="addTask()">
    追加
</button>

<hr>

<h2>今日</h2>

<div id="taskList">
</div>

<div id="status">
    タスクを入力してください
</div>

<!--
	<button onclick="testAddTask()">
	    Firestore接続テスト
	</button>

	<button onclick="loadTasks()">
	    Firestoreから読み込み
	</button>
-->

<h2>今日</h2>
<div id="todayList"></div>

<h2>明日</h2>
<div id="tomorrowList"></div>

<hr>

<h2>そのうち</h2>
<div id="somedayList"></div>
```

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
	query,
	orderBy,
	doc,
    updateDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADTLt3GU2IrdqlzhLxRnZxf_XAbnJp6x4",
  authDomain: "ashita-yaru.firebaseapp.com",
  projectId: "ashita-yaru",
  storageBucket: "ashita-yaru.firebasestorage.app",
  messagingSenderId: "965649048873",
  appId: "1:965649048873:web:bec7089b9f2044b62a0338"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addTask = async function () {

    const title = document.getElementById("taskTitle").value.trim();

    if (!title) {
        alert("タイトルを入力してください");
        return;
    }

    try {
        await addDoc(
            collection(db, "tasks"),
            {
                title: title,
                detail: "",
                dueDate: null,
                importance: 2,
                motivation: 2,
                bucket: "today",
                completed: false,
                tomorrowCount: 0,
                somedayCount: 0,
                sortOrder: Date.now(),
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                completedAt: null,
                lastMovedAt: serverTimestamp()
            }
        );

        document.getElementById("taskTitle").value = "";
        document.getElementById("status").innerHTML = "✅ 追加しました";

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML = "❌ エラー<br>" + error.message;
    }
};

window.loadTasks = async function () {

    const todayList = document.getElementById("todayList");
    const tomorrowList = document.getElementById("tomorrowList");
    const somedayList = document.getElementById("somedayList");

    todayList.innerHTML = "";
    tomorrowList.innerHTML = "";
    somedayList.innerHTML = "";

    try {

        const q = query(
            collection(db, "tasks"),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        snapshot.forEach((doc) => {

            const task = doc.data();
            const completedMark = task.completed ? "☑" : "☐";

            const moveButton =
			    task.bucket === "today"
			    ? `<button onclick="moveToTomorrow('${doc.id}')">明日</button>`
			    : "";

			const html = `
			    <div style="
			        background:white;
			        padding:10px;
			        margin:10px 0;
			        border-radius:8px;
			    ">
			        <span
			            style="cursor:pointer;"
			            onclick="toggleComplete('${doc.id}', ${task.completed})"
			        >
			            ${completedMark} ${task.title}
			        </span>

			        ${moveButton}
			    </div>
            `;

            if (task.bucket === "today") {
                todayList.innerHTML += html;
            }

            else if (task.bucket === "tomorrow") {
                tomorrowList.innerHTML += html;
            }

            else if (task.bucket === "someday") {
                somedayList.innerHTML += html;
            }

        });

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 読み込みエラー<br>" + error.message;
    }
};

window.toggleComplete = async function (taskId, completed) {

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                completed: !completed,
                completedAt: !completed ? serverTimestamp() : null,
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.moveToTomorrow = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "tomorrow",

                tomorrowCount: 1,

                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

</script>

</body>
</html>
