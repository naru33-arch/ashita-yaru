<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<title>明日できることは明日やる</title>

<style>
/* =========================
   1. GLOBAL
========================= */
body {
    font-family: sans-serif;
    background: #f4f1e8;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 22px;
    text-align: center;
    white-space: nowrap;
    color: #5b4636;
    font-weight: bold;
    letter-spacing: 1px;
}

h2 {
    margin-top: 18px;
    margin-bottom: 12px;
    font-size: 20px;
    color: #5b4636;
    border-bottom: 2px solid #c8bca8;
    padding-bottom: 6px;
}

.hidden {
    display: none;
}

.container {
    max-width: 600px;
    margin: auto;
    padding-bottom: 120px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 14px;
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 2px solid #c8bca8;
    font-weight: bold;
}

.section-header span:last-child {
    font-size: 12px;
    color: #8a8175;
    font-weight: normal;
    font-style: italic;
	opacity: 0.7;
}

/* =========================
   2. LAYOUT
========================= */
.container {
    max-width: 600px;
    margin: auto;
}

.sortable-list {
    min-height: 10px;
}

/* =========================
   3. TASK CARD
========================= */
.swipe-wrapper {
    position: relative;
    overflow: hidden;
}

.task-card {
    background: transparent;
    padding: 3px 0;
    margin: 0;
    border-radius: 0;
    box-shadow: none;
    border-bottom: 1px solid #d6cdbc;

    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;

    width: 100%;
    box-sizing: border-box;
    
    position: relative;
	z-index: 2;
	
	background: #f4f1e8;
	
	transition: transform 0.16s cubic-bezier(0.25, 0.8, 0.25, 1);
}
}

.task-text {
    flex: 1;
    min-width: 0;
    color: #3f3428;
}

.empty-task {
    opacity: 0.35;
}

/* =========================
   4. BUTTONS
========================= */
.swipe-actions {
    position: absolute;
    top: 0;
    right: 0;

    height: 100%;
    width: 190px;

    display: none;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;

    padding-right: 6px;

    background: rgba(230, 224, 210, 0.98);

    z-index: 5;
}

.swipe-wrapper.open .swipe-actions {
    display: flex;
}

.swipe-actions {
    opacity: 0;
    transition: opacity 0.15s ease;
}

.swipe-wrapper.open .swipe-actions {
    display: flex;
    opacity: 1;
}

/* =========================
.task-card.swiped-left {
    transform: translateX(-180px);
}

.task-buttons {
    display: none;
    align-items: center;
    transition: opacity 0.2s;
}
========================= */

.task-buttons button {
    font-size: 18px;
    padding: 2px 4px;
    margin-left: 2px;
    border: none;
    background: none;
    cursor: pointer;
}

.task-buttons button:hover {
    opacity: 0.6;
}


.task-card.swiped .task-buttons {
    opacity: 1 !important;
    display: flex !important;
}

.task-card.dragging {
    opacity: 0.5;
}

.swipe-wrapper.open .drag-handle {
    opacity: 0;
}

/* =========================
   5. DRAG & SORT
========================= */

.drag-handle {
    font-size: 26px;
    padding: 8px;
    cursor: grab;
    user-select: none;
    color: #666;
    min-width: 30px;
    text-align: center;
}

.drag-handle:active {
    cursor: grabbing;
}

.sortable-ghost {
    opacity: 0.6;
    transform: scale(1.03);
    background: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* =========================
   6. FAB & FORM
========================= */

.fab {
    position: fixed;
    right: 24px;
    bottom: 24px;

    width: 64px;
    height: 64px;

    border-radius: 50%;
    border: none;

    background: #7b5b43;
    color: white;

    font-size: 24px;
    cursor: pointer;

    box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    
    z-index: 900;
}

.task-form {
    position: fixed;
    left: 50%;
    bottom: 88px;
    transform: translateX(-50%);

    width: 92%;
    max-width: 360px;

    background: #fffdf8;
    padding: 12px;

    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);

    z-index: 1000;
}

.form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}

.form-actions {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
}

.task-form input,
.task-form select,
.task-form button {
    font-size: 16px;
    height: 42px;
    padding: 8px;
    box-sizing: border-box;
}

.task-form input {
    width: 100%;
    margin-bottom: 8px;
}

#overlay {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.35);

    z-index: 999;
}

/* =========================
   7. MOBILE
========================= */
/* PC hover */
@media (hover: hover) and (pointer: fine) {
    .swipe-wrapper:hover .task-card {
        transform: translateX(-180px);
    }

    .swipe-wrapper:hover .swipe-actions {
        display: flex !important;
        opacity: 1 !important;
    }
}}

@media (hover: none) and (pointer: coarse) {
    .completed-mark {
        display: none;
    }
}

/* Mobile */
@media (max-width: 768px) {

	/* swipe action buttons (mobile gesture) */
    .task-card.swiped .task-buttons {
        display: flex !important;
    }

    .drag-handle {
        font-size: 30px;
        padding: 12px;
        min-width: 40px;
    }

    .task-text {
        font-size: 18px;
        line-height: 1.4;
    }

    .task-card {
        touch-action: pan-y;
    }

}

@media (max-width: 768px) {
    .task-card,
    .task-text,
    .drag-handle {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
    }
}

</style>

</head>

<body>

<div class="container">

<!-- <h1>📖 明日できることは明日やる</h1> -->

<div id="status" style="display:none;"></div>

<div id="taskForm" class="task-form hidden">

    <input
        id="taskTitle"
        type="text"
        placeholder="タスクを入力"
    >
	<div class="form-row">
	    <select id="importance">
	        <option value="3">🔴 高</option>
	        <option value="2" selected>🟡 中</option>
	        <option value="1">⚪ 低</option>
	    </select>

	    <select id="motivation">
	        <option value="5">🚀 やるぞ</option>
	        <option value="4">🙂 普通</option>
	        <option value="3" selected>😐 微妙</option>
	        <option value="2">🥱 やりたくない</option>
	        <option value="1">💀 無理</option>
	    </select>
	</div>
	<div class="form-actions">
    	<button onclick="addTask()">追加</button>
    	<button onclick="closeTaskForm()">閉じる</button>
	</div>
</div>

<button class="fab" onclick="openTaskForm()">
    ＋
</button>

<div
    id="overlay"
    class="hidden"
    onclick="closeTaskForm()"
></div>

<div id="status" style="display:none;"></div>

<div class="section-header">
    <span>📖 今日やること</span>
    <span id="todayDate"></span>
</div>
<div id="todayList"></div>

<div class="section-header">
    <span>🌙 明日でいいこと</span>
    <span id="tomorrowDate"></span>
</div>
<div id="tomorrowList"></div>

<h2>📦 いつかやること</h2>
<div id="somedayList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
	query,
	orderBy,
	doc,
    updateDoc,
    deleteDoc,
    increment,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADTLt3GU2IrdqlzhLxRnZxf_XAbnJp6x4",
  authDomain: "ashita-yaru.firebaseapp.com",
  projectId: "ashita-yaru",
  storageBucket: "ashita-yaru.firebasestorage.app",
  messagingSenderId: "965649048873",
  appId: "1:965649048873:web:bec7089b9f2044b62a0338"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const today = new Date();

document.getElementById("todayDate").textContent =
    today.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
    });

const tomorrow = new Date();
tomorrow.setDate(today.getDate() + 1);

document.getElementById("tomorrowDate").textContent =
    tomorrow.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
    });



function emptyTask() {
    return `
        <div class="task-card empty-task">
            ☐
        </div>
    `;
}

window.initSwipe = function () {
	// console.log("initSwipe called");

    document.querySelectorAll(".task-card").forEach((card) => {

        let startX = 0;
        let startY = 0;

        card.addEventListener("touchstart", function (event) {

            if (event.target.closest(".drag-handle")) {
                return;
            }

            if (event.target.closest("button")) {
                return;
            }
            
            document.querySelectorAll(".swipe-wrapper").forEach((item) => {
			    if (item !== card.closest(".swipe-wrapper")) {
			        item.classList.remove("open");
			    }
			});

            startX = event.touches[0].clientX;
            startY = event.touches[0].clientY;

        });

		/* 右スワイプ演出、一旦撤退
		card.addEventListener("touchmove", (e) => {

		    const strikeLine =
		        card.querySelector(".strike-line");

		    let currentX = e.touches[0].clientX;
		    let diffX = currentX - startX;

		    // 右スワイプだけ
		    if (diffX > 0) {

		        // 最大100%
		        let progress = Math.min(diffX, 100);

		        strikeLine.style.width =
		            progress + "%";
		    }
		});
		右スワイプ演出、一旦撤退 */
		
        card.addEventListener("touchend", function (event) {
			// console.log("touchend fired");
            if (!startX) {
                return;
            }
            
             //右スワイ一旦撤退
             //const strikeLine =
		     //   card.querySelector(".strike-line");

            const endX = event.changedTouches[0].clientX;
            const endY = event.changedTouches[0].clientY;

            const diffX = endX - startX;
            const diffY = endY - startY;
            
            // console.log("diffX:", diffX, "diffY:", diffY);

			if (Math.abs(diffX) < 60) {
			    startX = 0;
			    return;
			}
            if (Math.abs(diffY) > Math.abs(diffX)) {
                startX = 0;
                return;
            }

            // 左スワイプ：操作ボタン表示
            if (diffX < -60) {
			
             	// console.log("left swipe detected");
                
                document.querySelectorAll(".task-card").forEach((item) => {
                    item.classList.remove("swiped-left");
                });
                card.closest(".swipe-wrapper").classList.add("open");

            }
			
            // 右スワイプ：完了 / 未完了
            if (diffX > 60) {

                // console.log("right swipe detected");
                
                const wrapper = card.closest(".swipe-wrapper");

				if (wrapper.classList.contains("open")) {
				    wrapper.classList.remove("open");
				    startX = 0;
				    return;
				}
                const taskId = card.dataset.id;
                const completed = card.dataset.completed === "true";

                toggleComplete(taskId, completed);
            
            	//if (diffX > 0 && diffX < 60) {
        		//	strikeLine.style.width = "0%";
            	//}
			}
            startX = 0;
        });
    });
};

window.closeAllSwipe = function () {
    document.querySelectorAll(".swipe-wrapper").forEach((wrapper) => {
	    item.classList.remove("open");
	});
};

window.addTask = async function () {

    const title = document.getElementById("taskTitle").value.trim();
    const importance =
    Number(
        document.getElementById("importance").value
    	);
	const motivation =
    	Number(
        	document.getElementById("motivation").value
    	);
    if (!title) {
        alert("タイトルを入力してください");
        return;
    }

    try {
        await addDoc(
            collection(db, "tasks"),
            {
                title: title,
                detail: "",
                dueDate: null,
                importance: importance,
                motivation: motivation,
                bucket: "today",
                completed: false,
                tomorrowCount: 0,
                somedayCount: 0,
                sortOrder: Date.now(),
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                completedAt: null,
                lastMovedAt: serverTimestamp()
            }
        );

        document.getElementById("taskTitle").value = "";
		closeTaskForm();
        document.getElementById("status").innerHTML = "✅ 追加しました";
        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML = "❌ エラー<br>" + error.message;
    }
};

window.loadTasks = async function () {

    const todayList = document.getElementById("todayList");
    const tomorrowList = document.getElementById("tomorrowList");
    const somedayList = document.getElementById("somedayList");

    todayList.innerHTML = "読み込み中...";
    tomorrowList.innerHTML = "読み込み中...";
    somedayList.innerHTML = "読み込み中...";

    let todayTodo = "";
    let todayDone = "";
    let tomorrowTodo = "";
    let tomorrowDone = "";
    let somedayTodo = "";
    let somedayDone = "";

    try {
        const q = query(
            collection(db, "tasks"),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        snapshot.forEach((docSnap) => {

            const task = docSnap.data();
            const completedMark = task.completed ? "☑" : "☐";
            let titleStyle = "";
			if (task.completed) {
			    titleStyle =
        			"text-decoration: line-through; opacity: 0.25;filter: grayscale(100%);";
			}

			let importanceEmoji = "🟡";

			if (task.importance === 3) {
			    importanceEmoji = "🔴";
			}

			else if (task.importance === 2) {
			    importanceEmoji = "🟡";
			}
			else {
			    importanceEmoji = "⚪";
			}

			let motivationEmoji = "😐";

			if (task.motivation === 5) {
			    motivationEmoji = "🚀";
			}

			else if (task.motivation === 4) {
			    motivationEmoji = "🙂";
			}

			else if (task.motivation === 3) {
			    motivationEmoji = "😐";
			}

			else if (task.motivation === 2) {
			    motivationEmoji = "🥱";
			}

			else {
			    motivationEmoji = "💀";
			}

            let moveButtons = "";

            if (task.bucket === "today") {
		    moveButtons = `
		        <button onclick="editTask('${docSnap.id}', '${task.title}')">✏️</button>

		        <button onclick="moveToTomorrow('${docSnap.id}')">🌙</button>

		        <button onclick="moveToSomeday('${docSnap.id}')">📦</button>

		        <button onclick="deleteTask('${docSnap.id}')">🗑️</button>
		    `;
			} else if (task.bucket === "tomorrow" || task.bucket === "someday") {
			    moveButtons = `
			        <button onclick="editTask('${docSnap.id}', '${task.title}')">✏️</button>

			        <button onclick="moveToToday('${docSnap.id}')">↩️</button>

			        <button onclick="deleteTask('${docSnap.id}')">🗑️</button>
			    `;
			}

			const tomorrowBadge =
			    task.tomorrowCount && task.tomorrowCount > 0
			    ? ` 🌙×${task.tomorrowCount}`
			    : "";

			const html = `
			    <div class="swipe-wrapper">
			        <div
			            class="task-card"
			            data-id="${docSnap.id}"
			            data-completed="${task.completed}"
			        >
		            <span
		                class="task-text"
		                style="
		                    cursor:default;
		                    flex:1;
		                    user-select:none;
		                    ${titleStyle}
		                "
		                onclick="handleTaskClick('${docSnap.id}', ${task.completed})"
			        >
		            <span class="task-label">
				            <span class="completed-mark">${completedMark}</span>
				            ${importanceEmoji}${motivationEmoji} ${task.title}${tomorrowBadge}
				    </span>
		        </span>
	            <span class="drag-handle">☰</span>
			        
				</div>
	        	<div class="swipe-actions">
	            	${moveButtons}
	        	</div>
	    	</div>
		`;			
            if (task.bucket === "today") {
                if (task.completed) {
                    todayDone += html;
                } else {
                    todayTodo += html;
                }
            } else if (task.bucket === "tomorrow") {
                if (task.completed) {
                    tomorrowDone += html;
                } else {
                    tomorrowTodo += html;
                }
            } else if (task.bucket === "someday") {
                if (task.completed) {
                    somedayDone += html;
                } else {
                    somedayTodo += html;
                }
            }
        });

		todayList.innerHTML = `
		    <div class="sortable-list" data-bucket="today">
		        ${todayTodo || emptyTask()}
		    </div>

		    ${todayDone || emptyTask()}
		`;

		tomorrowList.innerHTML = `
		    <div class="sortable-list" data-bucket="tomorrow">
		        ${tomorrowTodo || emptyTask()}
		    </div>

		    ${tomorrowDone || emptyTask()}
		`;

		somedayList.innerHTML = `
		    <div class="sortable-list" data-bucket="someday">
		        ${somedayTodo || emptyTask()}
		    </div>

		    ${somedayDone || emptyTask()}
		`;
		initSortable();
		initSwipe();

    } catch (error) {
        console.error("UI初期化エラー:", error);
        todayList.innerHTML = emptyTask();
	    tomorrowList.innerHTML = emptyTask();
    	somedayList.innerHTML = emptyTask();
        document.getElementById("status").innerHTML =
            "❌ 読み込みエラー<br>" + error.message;
    }
};

window.toggleComplete = async function (taskId, completed) {

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                completed: !completed,
                completedAt: !completed ? serverTimestamp() : null,
                updatedAt: serverTimestamp()
            }
        );

        loadTasks();

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.handleTaskClick = function (taskId, completed) {

    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
        return;
    }

    toggleComplete(taskId, completed);
};

window.moveToTomorrow = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "tomorrow",
                tomorrowCount: increment(1),
                updatedAt: serverTimestamp()
            }
        );

        closeAllSwipe();
        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.moveToSomeday = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "someday",

                somedayCount: 1,

                updatedAt: serverTimestamp()
            }
        );

        closeAllSwipe();
        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.moveToToday = async function (taskId) {

    try {

        await updateDoc(
            doc(db, "tasks", taskId),
            {
                bucket: "today",
                updatedAt: serverTimestamp()
            }
        );

        closeAllSwipe();
        loadTasks();

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 移動エラー<br>" + error.message;
    }
};

window.deleteTask = async function (taskId) {

    const ok = confirm("このタスクを削除しますか？");

    if (!ok) {
        return;
    }

    try {
        await deleteDoc(
            doc(db, "tasks", taskId)
        );

        document.getElementById("status").innerHTML =
            "🗑️ 削除しました";

        closeAllSwipe();
        loadTasks();

    } catch (error) {
        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 削除エラー<br>" + error.message;
    }
};

window.editTask = async function (taskId, currentTitle) {

    const newTitle = prompt("タスク名を編集", currentTitle);

    if (newTitle === null) {
        return;
    }

    const title = newTitle.trim();

    if (!title) {
        alert("タイトルは空にできません");
        return;
    }

    try {
        await updateDoc(
            doc(db, "tasks", taskId),
            {
                title: title,
                updatedAt: serverTimestamp()
            }
        );

        document.getElementById("status").innerHTML =
            "✏️ 更新しました";

        closeAllSwipe();
        loadTasks();

    } catch (error) {
        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ 更新エラー<br>" + error.message;
    }
};

window.initSortable = function () {

    document.querySelectorAll(".sortable-list").forEach((list) => {

        new Sortable(list, {
            animation: 150,
            handle: ".drag-handle",
            ghostClass: "dragging",

            onEnd: async function () {

                const cards = list.querySelectorAll(".task-card");

                try {
                    const updates = [];

                    cards.forEach((card, index) => {
                        const taskId = card.dataset.id;

                        updates.push(
                            updateDoc(
                                doc(db, "tasks", taskId),
                                {
                                    sortOrder: (index + 1) * 1000,
                                    updatedAt: serverTimestamp()
                                }
                            )
                        );
                    });

                    await Promise.all(updates);

                    document.getElementById("status").innerHTML =
                        "↕️ 並び順を保存しました";

                } catch (error) {
                    console.error("UI初期化エラー:", error);
                    document.getElementById("status").innerHTML =
                        "❌ 並び替え保存エラー<br>" + error.message;
                }
            }
        });
    });
};

window.addEventListener("load", function () {
    loadTasks();
});

window.openTaskForm = function () {
    document.getElementById("taskForm").classList.remove("hidden");
    document.getElementById("overlay").classList.remove("hidden");
    document.querySelector(".fab").style.display = "none";
    document.getElementById("taskTitle").focus();
};

window.closeTaskForm = function () {
    document.getElementById("taskForm").classList.add("hidden");
    document.getElementById("overlay").classList.add("hidden");
    document.querySelector(".fab").style.display = "block";
};

</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</body>
